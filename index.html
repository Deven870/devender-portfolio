  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

    :root {
      --primary: #667eea;
      --primary-dark: #764ba2;
      --primary-darker: #5b3a99;
      --accent: #f093fb;
      --accent-dark: #f5576c;
      --bg-dark: #0a0e27;
      --bg-darker: #0f1632;
      --bg-card: #1a1f3a;
      --text-primary: #ffffff;
      --text-secondary: #e0e7ff;
      --text-muted: #94a3b8;
      --border-color: rgba(148, 163, 184, 0.1);
      --shadow-color: rgba(102, 126, 234, 0.4);
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      --glow: 0 0 20px rgba(102, 126, 234, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e27;
      color: var(--text-secondary);
      line-height: 1.6;
      scroll-behavior: smooth;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(245, 87, 108, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
      z-index: -1;
      animation: gradientShift 15s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.1); }
    }

    /* Custom Cursor */
    .custom-cursor {
      width: 20px;
      height: 20px;
      border: 2px solid var(--primary);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.2s ease, width 0.3s ease, height 0.3s ease;
      mix-blend-mode: difference;
    }

    .custom-cursor.hover {
      width: 50px;
      height: 50px;
      background: rgba(96, 165, 250, 0.1);
    }

    .cursor-follower {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.15s ease;
    }

    /* Loading Screen */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(96, 165, 250, 0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Scroll Progress Bar */
    .scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 5px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
      z-index: 10000;
      transform-origin: left;
      transition: width 0.1s linear;
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.8), 0 0 40px rgba(245, 87, 108, 0.4);
    }

    /* Floating Action Buttons */
    .fab-container {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .fab {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(26, 31, 58, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: var(--transition);
      animation: fadeInUp 0.5s ease backwards;
      border: 1px solid rgba(102, 126, 234, 0.3);
      position: relative;
      overflow: hidden;
    }

    .fab::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      opacity: 0;
      transition: var(--transition);
    }

    .fab:hover::before {
      opacity: 1;
    }

    .fab i {
      position: relative;
      z-index: 1;
      font-size: 1.2rem;
    }

    .fab:hover {
      transform: translateY(-8px) scale(1.15) rotate(10deg);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6), 0 0 30px rgba(245, 87, 108, 0.4);
      border-color: rgba(102, 126, 234, 0.8);
    }

    .fab:nth-child(1) { animation-delay: 0.1s; }
    .fab:nth-child(2) { animation-delay: 0.2s; }
    .fab:nth-child(3) { animation-delay: 0.3s; }

    /* Particles Background */
    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      opacity: 0.6;
    }

    /* Parallax Layers */
    .parallax-layer {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    /* Navigation */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(26, 31, 58, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      padding: 1.2rem 3rem;
      z-index: 1000;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(102, 126, 234, 0.2);
      transform: translateY(0);
      transition: var(--transition);
    }

    nav::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 100%;
      background: linear-gradient(90deg, 
        rgba(102, 126, 234, 0.05) 0%, 
        rgba(118, 75, 162, 0.05) 50%, 
        rgba(245, 87, 108, 0.05) 100%);
      z-index: -1;
    }

    nav.hidden {
      transform: translateY(-100%);
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    nav a {
      color: #94a3b8;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
      position: relative;
    }

    nav a:hover {
      color: #60a5fa;
    }

    nav a::after {
      content: '';
      position: absolute;
      wTheme Toggle */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1001;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }

    .theme-toggle:hover {
      transform: scale(1.1) rotate(15deg);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
    }

    .theme-toggle i {
      color: white;
      font-size: 1.2rem;
    }

      height: 2px;
      bottom: -5px;
      left: 0;
      background: linear-gradient(90deg, #60a5fa, #3b82f6);
      transition: width 0.3s ease;
    }

    nav a:hover::after {
      width: 100%;
    }

    /* Sections */
    section {
      padding: 100px 20px;
      max-width: 1100px;
      margin: auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    section:first-of-type {
      margin-top: 60px;
    }

    h1 {
      font-size: 5.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #667eea 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.5rem;
      animation: fadeInUp 0.8s ease, gradientAnimation 8s ease infinite, float 6s ease-in-out infinite;
      min-height: 100px;
      letter-spacing: -2px;
      position: relative;
      filter: drop-shadow(0 0 30px rgba(102, 126, 234, 0.5));
    }

    @keyframes gradientAnimation {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Typing Animation */
    .typing-text {
      display: inline-block;
      border-right: 3px solid #60a5fa;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      0%, 50% { border-color: #60a5fa; }
      51%, 100% { border-color: transparent; }
    }

    h2 {
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 2rem;
      color: var(--text-primary);
      position: relative;
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h2::after {
      content: '';
      position: absolute;
      bottom: -15px;
      left: 0;
      width: 80px;
      height: 5px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 10px;
      animation: slideIn 0.6s ease, pulse 2s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.6);
    }

    @keyframes pulse {
      0%, 100% { transform: scaleX(1); opacity: 1; }
      50% { transform: scaleX(1.1); opacity: 0.8; }
    }

    @keyframes slideIn {
      from {var(--text-muted);
      margin-bottom: 1.5rem;
      font-weight: 400;
      animation: fadeInUp 0.8s ease 0.2s backwards;
    }

    p {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 600px;
      animation: fadeInUp 0.8s ease 0.4s backwards;
    }

    /* 3D Cards with Tilt Effect */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
      perspective: 1000px;
    }

    .card {
      background: rgba(26, 31, 58, 0.6);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      padding: 2.5rem;
      border-radius: 24px;
      border: 1px solid rgba(102, 126, 234, 0.2);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.6s ease backwards;
      transform-style: preserve-3d;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
      box-shadow: 0 0 15px rgba(102, 126, 234, 0.8);
    }

    .card::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 300%;
      height: 300%;
      background: radial-gradient(circle, rgba(102, 126, 234, 0.15) 0%, rgba(245, 87, 108, 0.1) 50%, transparent 70%);
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      border-radius: 50%;
    }

    .card:hover::before {
      transform: translateX(0);
    }

    .card:hover::after {
      transform: translate(-50%, -50%) scale(1);
    }

    .card:hover {
      transform: translateY(-15px) rotateX(3deg) scale(1.02);
      box-shadow: 0 25px 60px rgba(102, 126, 234, 0.4), 0 0 60px rgba(245, 87, 108, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      border-color: rgba(102, 126, 234, 0.5);
      box-shavar(--text-primary);
      position: relative;
      z-index: 1;
    }

    .card p {
      font-size: 1rem;
      color: var(--text-muted);
      margin: 0;
      position: relative;
      z-index: 1::before {
      transform: translateX(0);
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(59, 130, 246, 0.2);
      border-color: rgba(96, 165, 250, 0.3);
    }

    .card h3 {
      font-size: 1.2rem;
      margin-bottom: 0.8rem;
      color: #f1f5f9;
    }

    .card p {
      font-size: 1rem;
      color: #94a3b8;
      margin: 0;
    }

    /* Project Cards with Image Hover */
    .project-card {
      position: relative;
      height: 350px;
      overflow: hidden;
    }

    .project-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #1e293b 0%, transparent 100%);
      padding: 2rem;
      transform: translateY(60%);
      transition: transform 0.4s ease;
    }

    .project-card:hover .project-overlay {
      transform: translateY(0);
    }

    .project-tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .project-tag {
      background: rgba(96, 165, 250, 0.2);
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #60a5fa;
    }

    .project-links {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .project-link {
      color: #60a5fa;
      text-decoration: none;
      font-size: 1.5rem;
      transition: all 0.3s ease;
    }

    .project-link:hover {
      color: #3b82f6;
      transform: scale(1.2);
    }

    /* Skills Section */
    .skills-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 2rem;
    }

    .skill-tag {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
      font-size: 1rem;
      border: 1px solid rgba(148, 163, 184, 0.1);
      transition: all 0.3s ease;
      animation: fadeInUp 0.5s ease backwards;
    }

    .skill-tag:hover {
      background: linear-gradient(135deg, #334155 0%, #475569 100%);
      border-color: #60a5fa;
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }

    /* Progress bars for skills */
    .skill-item {
      margin-bottom: 1.5rem;
    }

    .skill-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .skill-bar {
      background: #1e293b;
      height: 10px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .skill-progress {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
      background-size: 200% auto;
      border-radius: 12px;
      transition: width 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.2);
      animation: gradientAnimation 3s ease infinite;
    }

    .skill-progress::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Stats Counter */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem;
      margin-top: 3rem;
    }

    .stat-item {
      text-align: center;
      padding: 2.5rem;
      background: rgba(26, 31, 58, 0.5);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 20px;
      border: 1px solid rgba(102, 126, 234, 0.2);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .stat-item::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(102, 126, 234, 0.1), transparent);
      transform: rotate(45deg);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0% { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(100%) rotate(45deg); }
    }

    .stat-item:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 25px 50px rgba(102, 126, 234, 0.4), 0 0 40px rgba(245, 87, 108, 0.3);
      border-color: rgba(102, 126, 234,0.5);
    }

    .stat-number {
      font-size: 4rem;
      font-weight: 900;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: block;
      animation: gradientAnimation 3s ease infinite;
      filter: drop-shadow(0 0 20px rgba(102, 126, 234, 0.5));
    }

    .stat-label {
      color: var(--text-secondary);
      margin-top: 0.8rem;
      font-size: 1.1rem;
      font-weight: 500;
    }

    /* Contact Section */
    .contact-links {
      display: flex;
      gap: 1.5rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .contact-btn {
      padding: 1.2rem 2.5rem;
      background: rgba(26, 31, 58, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      color: white;
      text-decoration: none;
      border-radius: 16px;
      font-weight: 600;
      font-size: 1.05rem;
      transition: var(--transition);
      border: 1px solid rgba(102, 126, 234, 0.3);
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .contact-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
      opacity: 0;
      transition: var(--transition);
      z-index: -1;
    }

    .contact-btn:hover::before {
      opacity: 1;
    }

    .contact-btn:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6), 0 0 30px rgba(245, 87, 108, 0.4);
      border-color: rgba(102, 126, 234, 0.8);
    }

    .contact-btn i {
      margin-right: 0.5rem;
    }

    /* Contact Form */
    .contact-form {
      max-width: 600px;
      margin-top: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #cbd5e1;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 1rem;
      background: #1e293b;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      color: #e5e7eb;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 150px;
    }

    .submit-btn {
      width: 100%;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 {
        font-size: 2.5rem;
      }

      h2 {
        font-size: 2rem;
      }

      .subtitle {
        font-size: 1.3rem;
      }

      nav ul {
        gap: 1rem;
        font-size: 0.9rem;
      }

      section {
        padding: 60px 20px;
      }

      .cards-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Scroll indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateX(-50%) translateY(0);
      }
      40% {
        transform: translateX(-50%) translateY(-10px);
      }
      60% {
        transform: translateX(-50%) translateY(-5px);

    /* Timeline Section */
    .timeline {
      position: relative;
      max-width: 1000px;
      margin: 3rem auto;
      padding: 2rem 0;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 50%;
      transform: translateX(-50%);

      box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);

    .timeline-item {

    }

    .timeline-item:nth-child(even) {

    }

    .timeline-content {
      background: rgba(26, 31, 58, 0.6);
      backdrop-filter: blur(20px);

      border-radius: 20px;
      border: 1px solid rgba(102, 126, 234, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      position: relative;

    .timeline-content:hover {

    .timeline-content::before {

    .timeline-item:nth-child(odd) .timeline-content::before {

    .timeline-item:nth-child(even) .timeline-content::before {

    /* Testimonials Section */
    .testimonial-grid {

    .testimonial-card {

    .testimonial-avatar {

    @media (max-width: 768px) {

      .timeline-item:nth-child(even) {
        width: 100%;
        margin-left: 40px;

      .timeline-item:nth-child(odd) .timeline-dot,
      .timeline-item:nth-child(even) .timeline-dot {

    /* Light Theme Styles */
    body[data-theme="light"] {

    }

    body[data-theme="light"] .timeline-content {

  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Cursor Trail Effect Component
    function CursorTrail() {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const trails = [];
        const maxTrails = 20;

        class Trail {
          constructor(x, y) {
            this.x = x;
            this.y = y;
            this.life = 1;
            this.size = Math.random() * 5 + 3;
          }

          update() {
            this.life -= 0.02;
          }

          draw() {
            const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
            gradient.addColorStop(0, `rgba(102, 126, 234, ${this.life * 0.8})`);
            gradient.addColorStop(0.5, `rgba(118, 75, 162, ${this.life * 0.5})`);
            gradient.addColorStop(1, `rgba(245, 87, 108, ${this.life * 0.2})`);
            
            ctx.shadowBlur = 15;
            ctx.shadowColor = `rgba(102, 126, 234, ${this.life})`;
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        const handleMouseMove = (e) => {
          trails.push(new Trail(e.clientX, e.clientY));
          if (trails.length > maxTrails) {
            trails.shift();
          }
        };

        document.addEventListener('mousemove', handleMouseMove);

        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          
          trails.forEach((trail, index) => {
            trail.update();
            trail.draw();
            if (trail.life <= 0) {
              trails.splice(index, 1);
            }
          });

          requestAnimationFrame(animate);
        }
        animate();

        const handleResize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };

        window.addEventListener('resize', handleResize);

        return () => {
          document.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('resize', handleResize);
        };
      }, []);

      return <canvas ref={canvasRef} style={{
        position: 'fixed',
        top: 0,
        left: 0,
        width: '100%',
        height: '100%',
        pointerEvents: 'none',
        zIndex: 9998
      }} />;
    }

    // Particles Background Component
    function ParticlesBackground() {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 80;

        class Particle {
          constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = (Math.random() - 0.5) * 0.5;
            this.radius = Math.random() * 2 + 1;
          }

          update() {
            this.x += this.vx;
            this.y += this.vy;

            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
          }

          draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(96, 165, 250, 0.5)';
            ctx.fill();
          }
        }

        for (let i = 0; i < particleCount; i++) {
          particles.push(new Particle());
        }

        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          particles.forEach(particle => {
            particle.update();
            particle.draw();
          });

          // Connect nearby particles
          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const dx = particles[i].x - particles[j].x;
              const dy = particles[i].y - particles[j].y;
              const distance = Math.sqrt(dx * dx + dy * dy);

              if (distance < 120) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(96, 165, 250, ${0.2 * (1 - distance / 120)})`;
                ctx.lineWidth = 1;
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
              }
            }
          }

          requestAnimationFrame(animate);
        }

        animate();

        const handleResize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };

        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      return <canvas ref={canvasRef} id="particles-canvas" />;
    }

    // Typing Effect Hook
    function useTypingEffect(texts, speed = 100) {
      const [displayText, setDisplayText] = useState('');
      const [textIndex, setTextIndex] = useState(0);
      const [isDeleting, setIsDeleting] = useState(false);

      useEffect(() => {
        const currentText = texts[textIndex];
        
        const timer = setTimeout(() => {
          if (!isDeleting) {
            if (displayText.length < currentText.length) {
              setDisplayText(currentText.slice(0, displayText.length + 1));
            } else {
              setTimeout(() => setIsDeleting(true), 2000);
            }
          } else {
            if (displayText.length > 0) {
              setDisplayText(currentText.slice(0, displayText.length - 1));
            } else {
              setIsDeleting(false);
              setTextIndex((textIndex + 1) % texts.length);
            }
          }
        }, isDeleting ? speed / 2 : speed);

        return () => clearTimeout(timer);
      }, [displayText, isDeleting, textIndex, texts, speed]);

      return displayText;
    }

    // Counter Animation Hook
    function useCountUp(end, duration = 2000) {
      const [count, setCount] = useState(0);
      const [hasStarted, setHasStarted] = useState(false);

      const startCounting = () => {
        if (hasStarted) return;
        setHasStarted(true);
        
        const startTime = Date.now();
        const animate = () => {
          const now = Date.now();
          const progress = Math.min((now - startTime) / duration, 1);
          setCount(Math.floor(progress * end));
          
          if (progress < 1) {
            requestAnimationFrame(animate);
          }
        };
        animate();
      };

      return [count, startCounting];
    }

    // Skill Progress Bar Component
    function SkillBar({ name, level, delay }) {
      const [width, setWidth] = useState(0);
      const skillRef = useRef(null);

      useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => {
            if (entries[0].isIntersecting) {
              setTimeout(() => setWidth(level), delay);
            }
          },
          { threshold: 0.5 }
        );

        if (skillRef.current) {
          observer.observe(skillRef.current);
        }

        return () => observer.disconnect();
      }, [level, delay]);

      return (
        <div className="skill-item" ref={skillRef}>
          <div className="skill-info">
            <span>{name}</span>
            <span>{level}%</span>
          </div>
          <div className="skill-bar">
            <div className="skill-progress" style={{ width: `${width}%` }}></div>
          </div>
        </div>
      );
    }

    function App() {
      const [theme, setTheme] = useState('dark');
      const [scrollProgress, setScrollProgress] = useState(0);
      const [loading, setLoading] = useState(true);
      const [activeSection, setActiveSection] = useState('home');
      const roles = ['AI Developer', 'Full Stack Developer', 'ML Engineer', 'Problem Solver'];
      const typedText = useTypingEffect(roles, 100);

      const [projectsCount, startProjectsCount] = useCountUp(15);
      const [certificationsCount, startCertificationsCount] = useCountUp(4);
      const [skillsCount, startSkillsCount] = useCountUp(20);

      // Theme Toggle Effect
      useEffect(() => {
        document.body.setAttribute('data-theme', theme);
      }, [theme]);

      // Loading Screen
      useEffect(() => {
        setTimeout(() => setLoading(false), 1500);
      }, []);

      // Custom Cursor
      useEffect(() => {
        if (loading) return;
        
        const cursor = document.createElement('div');
        cursor.className = 'custom-cursor';
        const follower = document.createElement('div');
        follower.className = 'cursor-follower';
        document.body.appendChild(cursor);
        document.body.appendChild(follower);

        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;
        let followerX = 0, followerY = 0;

        const handleMouseMove = (e) => {
          mouseX = e.clientX;
          mouseY = e.clientY;
        };

        document.addEventListener('mousemove', handleMouseMove);

        function animate() {
          cursorX += (mouseX - cursorX) * 0.3;
          cursorY += (mouseY - cursorY) * 0.3;
          followerX += (mouseX - followerX) * 0.15;
          followerY += (mouseY - followerY) * 0.15;

          cursor.style.transform = `translate(${cursorX - 10}px, ${cursorY - 10}px)`;
          follower.style.transform = `translate(${followerX - 4}px, ${followerY - 4}px)`;

          requestAnimationFrame(animate);
        }
        animate();

        // Add hover effect for interactive elements
        setTimeout(() => {
          const hoverElements = document.querySelectorAll('a, button, .card, .skill-tag');
          hoverElements.forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
          });
        }, 100);

        return () => {
          document.removeEventListener('mousemove', handleMouseMove);
          cursor.remove();
          follower.remove();
        };
      }, [loading]);

      // Scroll Progress
      useEffect(() => {
        if (loading) return;
        
        const handleScroll = () => {
          const scrollTop = window.scrollY;
          const docHeight = document.documentElement.scrollHeight - window.innerHeight;
          const progress = (scrollTop / docHeight) * 100;
          setScrollProgress(progress);
        };

        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, [loading]);

      // Scroll Reveal
      useEffect(() => {
        if (loading) return;
        
        const reveals = document.querySelectorAll('.reveal');
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('active');
            }
          });
        }, { threshold: 0.15 });

        reveals.forEach(reveal => observer.observe(reveal));
        return () => observer.disconnect();
      }, [loading]);

      // Active Section Detection
      useEffect(() => {
        if (loading) return;
        
        const sections = document.querySelectorAll('section');
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              setActiveSection(entry.target.id);
            }
          });
        }, { threshold: 0.5 });

        sections.forEach(section => observer.observe(section));
        return () => observer.disconnect();
      }, [loading]);

      // Stats Counter
      useEffect(() => {
        if (loading) return;
        
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                startProjectsCount();
                startCertificationsCount();
                startSkillsCount();
              }
            });
          },
          { threshold: 0.5 }
        );

        const statsSection = document.querySelector('#about');
        if (statsSection) observer.observe(statsSection);

        return () => observer.disconnect();
      }, [loading, startProjectsCount, startCertificationsCount, startSkillsCount]);

      const scrollToTop = () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      if (loading) {
        return (
          <div className="loading-screen">
            <div className="loader"></div>
          </div>
        );
      }

      return (
        <div>
          <div className="scroll-progress" style={{ width: `${scrollProgress}%` }}></div>
          
          <ParticlesBackground />
          <CursorTrail />
          
          <button className="theme-toggle" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}>
            <i className={theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon'}></i>
          </button>

          <div className="fab-container">
            <div className="fab" onClick={scrollToTop} title="Scroll to top">
              <i className="fas fa-arrow-up"></i>
            </div>
            <a href="https://github.com/yourusername" target="_blank" className="fab" title="GitHub">
              <i className="fab fa-github"></i>
            </a>
            <a href="https://linkedin.com/in/yourusername" target="_blank" className="fab" title="LinkedIn">
              <i className="fab fa-linkedin"></i>
            </a>
          </div>

          <a href="#" className="download-resume" title="Download Resume">
            <i className="fas fa-download"></i>
            <span>Resume</span>
          </a>

          <nav>
            <ul>
              <li><a href="#home" className={activeSection === 'home' ? 'active' : ''}>Home</a></li>
              <li><a href="#about" className={activeSection === 'about' ? 'active' : ''}>About</a></li>
              <li><a href="#skills" className={activeSection === 'skills' ? 'active' : ''}>Skills</a></li>
              <li><a href="#projects" className={activeSection === 'projects' ? 'active' : ''}>Projects</a></li>
              <li><a href="#certifications" className={activeSection === 'certifications' ? 'active' : ''}>Certifications</a></li>
              <li><a href="#timeline" className={activeSection === 'timeline' ? 'active' : ''}>Timeline</a></li>
              <li><a href="#testimonials" className={activeSection === 'testimonials' ? 'active' : ''}>Testimonials</a></li>
              <li><a href="#contact" className={activeSection === 'contact' ? 'active' : ''}>Contact</a></li>
            </ul>
          </nav>

          <section id="home" className="reveal">
            <h1>Devender</h1>
            <h2 className="subtitle">
              <span className="typing-text">{typedText}</span>
            </h2>
            <p>
              Computer Science Engineering student focused on Machine Learning
              and intelligent systems. Passionate about building innovative solutions
              that make a difference.
            </p>
          </section>

          <section id="about" className="reveal">
            <h2>About Me</h2>
            <p style={{maxWidth: '800px', marginTop: '2rem'}}>
              I'm a dedicated Computer Science Engineering student with a strong passion 
              for Artificial Intelligence and Full Stack Development. My journey in tech 
              has equipped me with expertise in building intelligent systems and scalable 
              web applications. I constantly strive to learn new technologies and apply 
              them to solve real-world problems.
            </p>

            <div className="stats-grid">
              <div className="stat-item">
                <span className="stat-number">{projectsCount}+</span>
                <span className="stat-label">Projects Completed</span>
              </div>
              <div className="stat-item">
                <span className="stat-number">{certificationsCount}</span>
                <span className="stat-label">Certifications</span>
              </div>
              <div className="stat-item">
                <span className="stat-number">{skillsCount}+</span>
                <span className="stat-label">Technologies</span>
              </div>
            </div>
          </section>

          <section id="skills" className="reveal">
            <h2>Skills & Technologies</h2>
            <div style={{marginTop: '2rem'}}>
              <SkillBar name="Python & Machine Learning" level={90} delay={0} />
              <SkillBar name="React.js & JavaScript" level={85} delay={100} />
